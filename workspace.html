<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WorkSpace — ваш персональный рабочий стол</title>
    <link rel="stylesheet" href="workspace.css">
</head>
<body>
<div class="workspace">
    <div class="main-area">
        <div class="greeting-block">
            <h2 id="welcomeTitle">✨ Добро пожаловать</h2>
            <p id="personalityDesc">Персонализированная среда готова к работе.</p>
        </div>
        <!-- Можно добавить виджет, но чат справа -->
    </div>
    <div class="chat-window">
        <div class="chat-header">
            <span>🤖 Нейро-ассистент</span>
            <span style="font-size:0.7rem" id="aiModeTag">режим: </span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-msg">Привет! Я твой ИИ-помощник, настроенный под твой тип личности и роль. Задай вопрос или попроси совет по работе.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>
<div class="hotbar" id="hotbarContainer"></div>

<script>
    // --- данные пользователя из localStorage ---
    let userRole = localStorage.getItem('workspace_role');
    let userPersonality = localStorage.getItem('workspace_personality');
    
    if (!userRole || !userPersonality) {
        alert('Настройки не найдены. Пожалуйста, выберите роль и тип личности сначала.');
        window.location.href = 'select.html';
    }
    
    // ---- Применение стилизации по типу личности ----
    const bodyEl = document.body;
    bodyEl.classList.add(userPersonality);
    
    // Текстовое приветствие
    const personalityNames = {
        melancholic: 'Меланхолик (вдумчивый, творческий)',
        sanguine: 'Сангвиник (энергичный, коммуникабельный)',
        choleric: 'Холерик (решительный, страстный)',
        phlegmatic: 'Флегматик (спокойный, стабильный)'
    };
    const roleNames = {
        programmer: 'Программист',
        designer: 'Дизайнер'
    };
    document.getElementById('welcomeTitle').innerHTML = `💼 Рабочий стол: ${roleNames[userRole]} · ${personalityNames[userPersonality]}`;
    document.getElementById('personalityDesc').innerHTML = `Стиль окружения, музыка и советы ИИ адаптированы под ${personalityNames[userPersonality].toLowerCase()}.`;
    document.getElementById('aiModeTag').innerHTML = `режим: ${roleNames[userRole]}, ${userPersonality.slice(0,4)}`;
    
    // ---------- Музыка через Web Audio (разные мелодии для каждого типа) ----------
    let audioCtx = null;
    let isMusicPlaying = false;
    let currentOsc = null;
    let musicInterval = null;
    
    function stopMusic() {
        if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        isMusicPlaying = false;
    }
    
    function playMelancholicMusic() {
        // меланхоличная: медленная последовательность
        let time = 0;
        musicInterval = setInterval(() => {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            const notes = [261.63, 293.66, 329.63, 349.23];
            osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
            gain.gain.value = 0.08;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
            osc.start(now);
            osc.stop(now + 1.2);
        }, 2800);
    }
    function playSanguineMusic() {
        let time = 0;
        musicInterval = setInterval(() => {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.value = 523.25 + Math.random() * 200;
            gain.gain.value = 0.1;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.9);
            osc.start(now);
            osc.stop(now + 0.8);
        }, 1000);
    }
    function playCholericMusic() {
        musicInterval = setInterval(() => {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.value = 659.25 + Math.random() * 300;
            gain.gain.value = 0.12;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.45);
        }, 700);
    }
    function playPhlegmaticMusic() {
        musicInterval = setInterval(() => {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = 196.00;
            gain.gain.value = 0.06;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.2);
            osc.start(now);
            osc.stop(now + 2.0);
        }, 3500);
    }
    
    function startMusic() {
        if(isMusicPlaying) return;
        if(audioCtx) stopMusic();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
        if(userPersonality === 'melancholic') playMelancholicMusic();
        else if(userPersonality === 'sanguine') playSanguineMusic();
        else if(userPersonality === 'choleric') playCholericMusic();
        else if(userPersonality === 'phlegmatic') playPhlegmaticMusic();
        isMusicPlaying = true;
    }
    
    // ---- Хотбар (приложения в зависимости от роли) ----
    const programmerApps = [
        { name: '💻 VS Code', url: 'https://vscode.dev', icon: '📝' },
        { name: '🐙 GitHub', url: 'https://github.com', icon: '🐙' },
        { name: '🖥️ CodePen', url: 'https://codepen.io', icon: '✒️' },
        { name: '📊 JSON Crack', url: 'https://jsoncrack.com', icon: '🔍' },
        { name: '🐳 Docker', url: 'https://labs.play-with-docker.com', icon: '🐳' }
    ];
    const designerApps = [
        { name: '🎨 Figma', url: 'https://figma.com', icon: '🎨' },
        { name: '🖌️ Adobe Color', url: 'https://color.adobe.com', icon: '🌈' },
        { name: '📸 Behance', url: 'https://behance.net', icon: '✨' },
        { name: '✏️ Coolors', url: 'https://coolors.co', icon: '🎨' },
        { name: '🖼️ Freepik', url: 'https://freepik.com', icon: '🖼️' }
    ];
    
    const apps = userRole === 'programmer' ? programmerApps : designerApps;
    const hotbarDiv = document.getElementById('hotbarContainer');
    apps.forEach(app => {
        const appDiv = document.createElement('div');
        appDiv.className = 'app-icon';
        appDiv.innerHTML = `<div style="font-size:1.7rem">${app.icon}</div><span>${app.name}</span>`;
        appDiv.addEventListener('click', () => window.open(app.url, '_blank'));
        hotbarDiv.appendChild(appDiv);
    });
    // добавить кнопку музыки
    const musicBtn = document.createElement('div');
    musicBtn.className = 'music-control';
    musicBtn.innerHTML = '🎵 Музыка выкл';
    musicBtn.style.cursor = 'pointer';
    let musicActive = false;
    musicBtn.addEventListener('click', () => {
        if(!musicActive) {
            startMusic();
            musicActive = true;
            musicBtn.innerHTML = '🔊 Музыка вкл';
        } else {
            stopMusic();
            musicActive = false;
            musicBtn.innerHTML = '🎵 Музыка выкл';
        }
    });
    hotbarDiv.appendChild(musicBtn);
    
    // ---------- ЧАТ с имитацией нейросети (контекстная) ----------
    const chatMessagesDiv = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    
    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
        msgDiv.innerText = text;
        chatMessagesDiv.appendChild(msgDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    // контекстные ответы
    function getAIResponse(userMessage, role, personality) {
        const msg = userMessage.toLowerCase();
        if(role === 'programmer') {
            if(msg.includes('код') || msg.includes('ошибк') || msg.includes('debug')) return `[Программист • ${personality}] Попробуй написать юнит-тесты. Для твоего типа личности (${personality}) советую работать с четкой документацией.`;
            if(msg.includes('проект') || msg.includes('задача')) return `Как ${personality}, ты можешь структурировать задачи через Kanban. Хочешь шаблон?`;
            return `Привет, коллега-программист! Твой тип ${personality} отлично подходит для глубокого анализа кода. Что нужно пофиксить?`;
        } else {
            if(msg.includes('макет') || msg.includes('ui') || msg.includes('ux')) return `Дизайнер с типом ${personality} — отличное чутье на композицию. Посоветую изучить референсы на Behance.`;
            if(msg.includes('цвет') || msg.includes('палитр')) return `Для ${personality} подойдут мягкие градиенты или контрастные сочетания. Попробуй coolors.co!`;
            return `Творческий подход + ${personality} даёт уникальный стиль. Какая задача по дизайну тебя волнует?`;
        }
    }
    
    async function sendMessage() {
        const text = chatInput.value.trim();
        if(!text) return;
        addMessage(text, true);
        chatInput.value = '';
        // имитация задержки нейросети
        setTimeout(() => {
            const answer = getAIResponse(text, userRole, userPersonality);
            addMessage(answer, false);
        }, 600 + Math.random() * 400);
    }
    
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    
    // дополнительная очистка музыки при выходе (необязательно)
    window.addEventListener('beforeunload', () => { if(audioCtx) audioCtx.close(); });
</script>
</body>
</html>
