<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkStyle — настройка профиля</title>
    <link rel="stylesheet" href="select.css">
</head>
<body>
<div class="select-container">
    <h2>⚙️ Настройте ваш профиль</h2>
    <div class="option-group">
        <div class="group-title">🧑‍💻 Ваша роль</div>
        <div class="radio-grid" id="roleGroup">
            <div class="radio-card" data-value="programmer">
                <input type="radio" name="role" value="programmer" id="prog">
                <label for="prog">👨‍💻 Программист</label>
            </div>
            <div class="radio-card" data-value="designer">
                <input type="radio" name="role" value="designer" id="des">
                <label for="des">🎨 Дизайнер</label>
            </div>
        </div>
    </div>

    <div class="option-group">
        <div class="group-title">🧠 Тип личности</div>
        <div class="radio-grid" id="personalityGroup">
            <div class="radio-card" data-value="melancholic">
                <input type="radio" name="personality" value="melancholic" id="mel">
                <label for="mel">🌙 Меланхолик</label>
            </div>
            <div class="radio-card" data-value="sanguine">
                <input type="radio" name="personality" value="sanguine" id="san">
                <label for="san">☀️ Сангвиник</label>
            </div>
            <div class="radio-card" data-value="choleric">
                <input type="radio" name="personality" value="choleric" id="chol">
                <label for="chol">🔥 Холерик</label>
            </div>
            <div class="radio-card" data-value="phlegmatic">
                <input type="radio" name="personality" value="phlegmatic" id="phleg">
                <label for="phleg">🌊 Флегматик</label>
            </div>
        </div>
    </div>

    <button class="btn-submit" id="startWorkspaceBtn">✨ Создать мой рабочий стол ✨</button>
    <a href="index.html" class="back-link">← Вернуться на приветственную</a>
</div>

<script>
    // Подсветка выбранной карточки
    function setupCardSelection(containerId) {
        const container = document.getElementById(containerId);
        const cards = container.querySelectorAll('.radio-card');
        cards.forEach(card => {
            const radio = card.querySelector('input');
            radio.addEventListener('change', function() {
                cards.forEach(c => c.classList.remove('selected'));
                if(this.checked) card.classList.add('selected');
            });
            if(radio.checked) card.classList.add('selected');
        });
    }
    setupCardSelection('roleGroup');
    setupCardSelection('personalityGroup');

    document.getElementById('startWorkspaceBtn').addEventListener('click', () => {
        const selectedRole = document.querySelector('input[name="role"]:checked');
        const selectedPersonality = document.querySelector('input[name="personality"]:checked');
        
        if(!selectedRole || !selectedPersonality) {
            alert('Пожалуйста, выберите и роль, и тип личности');
            return;
        }
        
        localStorage.setItem('workspace_role', selectedRole.value);
        localStorage.setItem('workspace_personality', selectedPersonality.value);
        window.location.href = 'workspace.html';
    });
</script>
</body>
</html>
